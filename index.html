<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Properties714 — Investment Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="styles.css">

<style>

header{
background:#0a0c18;
border-bottom:2px solid #f5c842
}

.logo{
color:#fff;
font-size:16px
}

.logo-badge{
background:linear-gradient(135deg,#f5c842,#ffd966);
color:#000;
font-weight:900;
padding:4px 10px;
border-radius:5px;
box-shadow:0 0 16px rgba(245,200,66,.7);
font-size:10px;
letter-spacing:1.5px
}

.header-status{
color:#fff;
font-weight:700;
font-size:12px
}

.user-email{
color:#fff;
font-weight:600
}

.user-logout{
color:#ff5c5c;
border:1px solid rgba(255,92,92,.5);
background:rgba(255,92,92,.12);
font-weight:700;
padding:5px 12px
}

.btn-gold{
background:linear-gradient(135deg,#f5c842,#ffd966);
color:#000;
font-weight:800;
box-shadow:0 0 20px rgba(245,200,66,.5);
border:1px solid #ffd84d
}

.user-avatar{
background:linear-gradient(135deg,#f5c842,#ffd966);
color:#000;
font-weight:900
}

</style>

</head>

<body>

<!-- AUTH SCREEN -->
<div id="auth-screen"></div>

<!-- PENDING SCREEN -->
<div id="pending-screen"></div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">

<header>

<div class="logo">
Properties<span class="logo-714">714</span>
<span class="logo-badge">PRO</span>
</div>

<div style="display:flex;align-items:center;gap:12px">

<div class="header-status">
<span class="pulse"></span>
<span data-t="system_online">System Online</span>
</div>

<button class="lang-toggle" onclick="toggleLang()" id="lang-btn">
<span id="lang-flag">🇲🇽</span>
<span id="lang-label">ES</span>
</button>

<div class="user-menu">

<div class="user-avatar" id="user-avatar-initials">?</div>

<div class="user-email" id="user-email-display"></div>

<button class="user-logout" onclick="doLogout()" data-t="sign_out">
Sign Out
</button>

</div>

</div>

</header>

<div class="app">

<nav class="sidebar">

<div class="nav-group">

<div class="nav-group-label">Overview</div>

<div class="nav-item active" onclick="nav('dashboard',this)">Dashboard</div>

<div class="nav-item" onclick="nav('pipeline',this)">Pipeline</div>

</div>

<div class="nav-group">

<div class="nav-group-label">Analysis</div>

<div class="nav-item" onclick="nav('analyzer',this)">Deal Analyzer</div>

<div class="nav-item" onclick="nav('repairs',this)">Repair Calc</div>

<div class="nav-item" onclick="nav('properties',this)">Properties</div>

</div>

<div class="nav-group">

<div class="nav-group-label">Network</div>

<div class="nav-item" onclick="nav('crm',this)">CRM</div>

<div class="nav-item" onclick="nav('lenders',this)">Lenders</div>

<div class="nav-item" onclick="nav('listings',this)">Listings</div>

</div>

<div class="nav-group">

<div class="nav-group-label">Tools</div>

<div class="nav-item" onclick="nav('scripts',this)">Scripts</div>

<div class="nav-item" onclick="nav('docs',this)">Documents</div>

<div class="nav-item" onclick="nav('settings',this)">Settings</div>

</div>

</nav>

<main class="main">

<div id="page-dashboard" class="page active"></div>

<div id="page-pipeline" class="page"></div>

<div id="page-analyzer" class="page"></div>

<div id="page-repairs" class="page"></div>

<div id="page-properties" class="page"></div>

<div id="page-crm" class="page"></div>

<div id="page-lenders" class="page"></div>

<div id="page-listings" class="page"></div>

<div id="page-scripts" class="page"></div>

<div id="page-docs" class="page"></div>

<div id="page-settings" class="page"></div>

<div id="page-admin-dashboard" class="page"></div>

<div id="page-admin" class="page"></div>

</main>

</div>

</div>

<!-- MODALS -->

<div class="modal-overlay" id="modal-contact"></div>

<div class="modal-overlay" id="modal-lender"></div>

<div class="modal-overlay" id="modal-listing"></div>

<!-- PASSWORD RESET -->

<div id="reset-password-overlay"></div>

<!-- SCRIPTS -->

<script src="config.js"></script>

<script src="auth.js"></script>

<script src="data.js"></script>

<script src="nav.js"></script>

<script src="dashboard.js"></script>

<script src="analyzer.js"></script>

<script src="crm.js"></script>

<script src="admin.js"></script>
