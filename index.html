<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Properties714 — Investment Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="styles.css">

</head>


<body>


<!-- ================= AUTH SCREEN ================= -->

<div id="auth-screen" style="display:flex;align-items:center;justify-content:center;height:100vh">

<div style="width:340px;background:#0e1020;padding:30px;border-radius:10px">

<h2 style="margin-bottom:15px;color:#fff">Properties714</h2>

<input id="login-email" placeholder="Email"
style="width:100%;margin-bottom:10px;padding:10px;border-radius:6px;border:1px solid #333;background:#111;color:#fff">

<input id="login-pass" type="password" placeholder="Password"
style="width:100%;margin-bottom:10px;padding:10px;border-radius:6px;border:1px solid #333;background:#111;color:#fff">

<button onclick="doLogin()" style="width:100%;padding:10px;background:#f5c842;border:0;border-radius:6px;font-weight:bold">
Sign In
</button>

<div id="login-error" style="color:red;margin-top:10px;display:none"></div>

</div>
</div>



<!-- ================= MAIN APP ================= -->

<div id="main-app" style="display:none">


<header>

<div class="logo">
Properties<span class="logo-714">714</span>
<span class="logo-badge">PRO</span>
</div>

<div class="user-menu">

<div class="user-avatar" id="user-avatar-initials">?</div>

<div class="user-email" id="user-email-display"></div>

<button class="user-logout" onclick="doLogout()">Sign Out</button>

</div>

</header>



<div class="app">


<!-- SIDEBAR -->

<nav class="sidebar">

<div class="nav-group">

<div class="nav-group-label">Overview</div>

<div class="nav-item active" onclick="nav('dashboard',this)">Dashboard</div>

<div class="nav-item" onclick="nav('pipeline',this)">Pipeline</div>

</div>


<div class="nav-group">

<div class="nav-group-label">Analysis</div>

<div class="nav-item" onclick="nav('analyzer',this)">Deal Analyzer</div>

<div class="nav-item" onclick="nav('repairs',this)">Repair Calc</div>

<div class="nav-item" onclick="nav('properties',this)">Properties</div>

</div>


<div class="nav-group">

<div class="nav-group-label">Network</div>

<div class="nav-item" onclick="nav('crm',this)">CRM</div>

<div class="nav-item" onclick="nav('lenders',this)">Lenders</div>

<div class="nav-item" onclick="nav('listings',this)">Listings</div>

</div>


<div class="nav-group">

<div class="nav-group-label">Tools</div>

<div class="nav-item" onclick="nav('scripts',this)">Scripts</div>

<div class="nav-item" onclick="nav('docs',this)">Documents</div>

<div class="nav-item" onclick="nav('settings',this)">Settings</div>

</div>

</nav>



<!-- MAIN CONTENT -->

<main class="main">

<div id="page-dashboard" class="page active"></div>

<div id="page-pipeline" class="page"></div>

<div id="page-analyzer" class="page"></div>

<div id="page-repairs" class="page"></div>

<div id="page-properties" class="page"></div>

<div id="page-crm" class="page"></div>

<div id="page-lenders" class="page"></div>

<div id="page-listings" class="page"></div>

<div id="page-scripts" class="page"></div>

<div id="page-docs" class="page"></div>

<div id="page-settings" class="page"></div>

<div id="page-admin-dashboard" class="page"></div>

<div id="page-admin" class="page"></div>

</main>

</div>

</div>



<!-- ================= MODALS ================= -->

<div class="modal-overlay" id="modal-contact"></div>
<div class="modal-overlay" id="modal-lender"></div>
<div class="modal-overlay" id="modal-listing"></div>



<!-- ================= PASSWORD RESET ================= -->

<div id="reset-password-overlay"></div>



<!-- ================= SCRIPTS ================= -->

<script src="config.js"></script>
<script src="data.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script src="dashboard.js"></script>
<script src="analyzer.js"></script>
<script src="repairs.js"></script>
<script src="crm.js"></script>
<script src="admin.js"></script>
<script src="lang.js"></script>


</body>
</html>
